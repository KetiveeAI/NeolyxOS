# =============================================================================
# SYSTEM COMMANDS AND TOOLS
# =============================================================================

system_commands:
  # System Administration
  nsm:
    description: "Neolyx System Manager"
    usage: "nsm <command> [options]"
    commands:
      user: "User management (add, remove, list, modify)"
      service: "Service management (start, stop, restart, status)"
      system: "System operations (info, update, backup, restore)"
      network: "Network management (config, status, test)"
      security: "Security operations (scan, update, audit)"
      logs: "Log management (view, clear, export)"
  
  # Network Tools
  ip:
    description: "IP Address Management"
    usage: "ip <command> [options]"
    commands:
      list: "Show all IP addresses"
      add: "Add IP address to interface"
      remove: "Remove IP address from interface"
      show: "Show interface details"
      ping: "Ping host"
  
  # Text Editor
  nano:
    description: "Neolyx Text Editor"
    usage: "nano [options] [file]"
    options:
      -w: "Don't wrap long lines"
      -c: "Show cursor position"
      -i: "Use auto-indentation"
      -k: "Cut from cursor to end of line"
      -m: "Enable mouse support"
  
  # Terminal Extensions
  nxt:
    description: "Neolyx Terminal Extensions"
    usage: "nxt <extension> [options]"
    extensions:
      theme: "Theme management (list, set, reset)"
      font: "Font management (list, set, size)"
      transparency: "Transparency control (on, off, level)"
      tabs: "Tab management (new, close, switch)"
      history: "Command history (show, clear, search)"
      alias: "Command aliases (list, add, remove)"
      plugin: "Plugin management (list, load, unload)"
  
  # Package Manager
  npa:
    description: "Neolyx Package Application"
    usage: "npa <command> [options]"
    commands:
      install: "Install application package"
      remove: "Remove application"
      list: "List installed applications"
      search: "Search for applications"
      update: "Update application"
      info: "Show package information"
      verify: "Verify package integrity"

# =============================================================================
# FILE SYSTEM STRUCTURE
# =============================================================================

file_system:
  # System Directories
  system_dirs:
    /system:
      /bin: "System executables (.nxt files)"
      /lib: "System libraries"
      /drivers: "System drivers (.nld files)"
      /config: "System configuration (.nlc files)"
      /boot: "Boot files (.nlb files)"
      /kernel: "Kernel files (.nlk files)"
    
    /apps:
      /bin: "Application executables"
      /packages: "Application packages (.npa files)"
      /data: "Application data"
      /config: "Application configuration"
      /icons: "Application icons (.nix files)"
    
    /home:
      /user: "User home directory"
      /documents: "User documents"
      /downloads: "User downloads"
      /pictures: "User pictures"
      /music: "User music"
      /videos: "User videos"
    
    /var:
      /log: "System logs"
      /cache: "System cache"
      /tmp: "Temporary files"
      /backup: "System backups"
    
    /etc:
      /config: "System configuration"
      /network: "Network configuration"
      /security: "Security configuration"
      /users: "User configuration"

# =============================================================================
# DEVELOPMENT GUIDELINES
# =============================================================================

development_guidelines:
  # Naming Conventions
  naming:
    extensions: "Use lowercase letters, max 4 characters"
    files: "Use descriptive names with appropriate extensions"
    directories: "Use lowercase with hyphens for spaces"
    
  # File Organization
  organization:
    source_code: "Place in /apps/src/[project]/"
    executables: "Place in /apps/bin/ or /system/bin/"
    packages: "Place in /apps/packages/"
    configuration: "Place in /etc/config/ or /apps/config/"
    icons: "Place in /apps/icons/ or /system/icons/"
    
  # Version Control
  version_control:
    source_files: "Track all source files (.nrs, .ncc, .npy, etc.)"
    configuration: "Track configuration files (.nlc, .ncf)"
    documentation: "Track documentation files (.nmd, .nrd)"
    ignore: "Ignore build artifacts, logs, and temporary files"

# =============================================================================
# SECURITY CONSIDERATIONS
# =============================================================================

security:
  # File Permissions
  permissions:
    executables: "755 (rwxr-xr-x)"
    configuration: "644 (rw-r--r--)"
    sensitive_config: "600 (rw-------)"
    system_files: "644 (rw-r--r--)"
    
  # Digital Signatures
  signatures:
    system_executables: "Must be signed by Neolyx OS"
    third_party_apps: "Must be signed by trusted developers"
    packages: "Must be verified before installation"
    
  # Encryption
  encryption:
    sensitive_data: "Use .nenc extension"
    keys: "Store in /etc/security/keys/"
    certificates: "Store in /etc/security/certs/"

# =============================================================================
# BACKUP AND RECOVERY
# =============================================================================

backup_recovery:
  # Backup Extensions
  backup_files:
    nbk: "Full system backup"
    nrs: "System restore point"
    nsn: "System snapshot"
    ncl: "System clone"
    
  # Backup Locations
  backup_locations:
    local: "/var/backup/"
    remote: "/mnt/backup/"
    cloud: "Configured cloud storage"
    
  # Recovery Procedures
  recovery:
    system_restore: "Use nsm system restore"
    file_recovery: "Use nfs recovery tools"
    data_recovery: "Use specialized recovery tools"

